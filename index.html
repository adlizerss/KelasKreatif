    <!-- Favicon & App Icon Setup -->
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <link rel="apple-touch-icon" href="logo.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffffff" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Outfit', 'sans-serif'],
            },
            colors: {
              glass: {
                100: 'rgba(255, 255, 255, 0.1)',
                200: 'rgba(255, 255, 255, 0.2)',
                300: 'rgba(255, 255, 255, 0.3)',
                400: 'rgba(255, 255, 255, 0.4)',
                500: 'rgba(255, 255, 255, 0.5)',
                800: 'rgba(255, 255, 255, 0.8)',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: transparent; /* Changed from #f8fafc to transparent */
      }
      .font-display {
        font-family: 'Outfit', sans-serif;
      }
      /* Hide scrollbar for clean UI but allow scroll */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Custom Glass Utils */
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      .dark .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* GLOBAL SMOOTH COLOR TRANSITION */
      /* Applies to common elements to ensure Dark/Light mode switch feels fluid */
      body, div, nav, button, input, textarea, select, span, p, h1, h2, h3, h4, h5, h6, svg, path, rect, circle, section, main, article {
        transition-property: background-color, border-color, color, fill, stroke, shadow, box-shadow, opacity;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); /* Standard Ease-in-out */
        transition-duration: 500ms; /* 0.5s duration for smoothness */
      }
      
      /* Exclude transform/layout properties to prevent jankiness during layout shifts */
      .no-color-transition {
        transition: none !important;
      }
    </style>
